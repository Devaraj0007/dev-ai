<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Research Agent</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="app-shell">
      <header>
        <p class="eyebrow">GROUNDED DOCUMENT Q&amp;A</p>
        <h1>Research Agent</h1>
        <p class="subhead">Answers strictly from your indexed documents, with verifiable citations.</p>
      </header>

      <section class="question-panel" aria-label="Ask a research question">
        <label for="question">Ask a question</label>
        <textarea id="question" maxlength="2000" placeholder="e.g. What is the paid parental leave policy?"></textarea>
        <div class="actions">
          <span id="char-count">0 / 2000</span>
          <button id="ask-button" type="button">Ask agent <span aria-hidden="true">→</span></button>
        </div>
      </section>

      <section id="status" class="status hidden" aria-live="polite"></section>
      <section id="result" class="result hidden" aria-live="polite">
        <div class="result-heading">
          <span class="label">ANSWER</span>
          <span id="grounding-badge" class="badge"></span>
        </div>
        <p id="answer"></p>
        <p id="gap-note" class="gap hidden"></p>
        <div id="citations-wrap" class="citations hidden">
          <h2>Sources used</h2>
          <ul id="citations"></ul>
        </div>
      </section>

      <section class="examples" aria-label="Example questions">
        <p class="label">TRY AN EXAMPLE</p>
        <div>
          <button class="example" type="button">How much parental leave is available?</button>
          <button class="example" type="button">What Docker version does PulseBoard need?</button>
          <button class="example" type="button">What was Q3 revenue?</button>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
